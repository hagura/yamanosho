<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- panolens.js 読み込み -->
  <script src="https://cdn.jsdelivr.net/npm/panolens@0.12.0/build/panolens.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.150.0/build/three.min.js"></script>

  <style>
    body, html { margin: 0; height: 100%; }
    #panorama { width: 100%; height: 100vh; }
  </style>
</head>
<body>

<div id="panorama"></div>

<script>
  const panorama = new PANOLENS.ImagePanorama('{{ page.image }}');
  const viewer = new PANOLENS.Viewer({
    container: document.querySelector('#panorama'),
    autoRotate: true,
    autoRotateSpeed: 0.3
  });
  viewer.add(panorama);
</script>

</body>
</html>
