<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://cdn.jsdelivr.net/npm/@panzoom/panzoom/dist/panzoom.min.js"></script>

  <style>
    body, html { margin: 0; height: 100%; overflow: hidden; }
    #wrapper {
      width: 100%;
      height: 100%;
      overflow: hidden;      /* ← 窓になる */
    }
    #pano {
      height: 100%;
      display: block;
      cursor: grab;          /* 視覚的にも「動かせそう」に */
    }
  </style>
</head>
<body>

<div id="wrapper">
  <img id="pano" src="{{ page.image }}">
</div>

<script>
  const img = document.getElementById('pano');
  const panzoom = Panzoom(img, {
    maxScale: 1,
    minScale: 1,
    contain: 'outside'
  });

  let direction = 1; // 1 = 右へ, -1 = 左へ

  function autoScroll() {
    const pos = panzoom.getPan();

    // pos が undefined の場合はスキップ
    if (!pos || isNaN(pos.x)) {
      requestAnimationFrame(autoScroll);
      return;
    }

    // スクロール速度（px/フレーム）
    const speed = 0.5;

    // 新しい位置
    const nextX = pos.x + speed * direction;

    console.log(nextX);

    // 画像の幅と wrapper の幅を取得
    const wrapper = document.getElementById('wrapper');
    const maxLeft = 0;
    const maxRight = wrapper.clientWidth - img.clientWidth;

    // 端に来たら方向反転
    if (nextX > maxLeft) direction = -1;
    if (nextX < maxRight) direction = 1;

    panzoom.pan({ x: nextX, y: pos.y });

    requestAnimationFrame(autoScroll);
  }

  // 画像が読み込まれてから開始
  img.onload = () => {
    autoScroll();
  };
</script>


</body>
</html>
