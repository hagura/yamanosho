<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://cdn.jsdelivr.net/npm/@panzoom/panzoom/dist/panzoom.min.js"></script>

  <style>
    body, html { margin: 0; height: 100%; overflow: hidden; }
    #wrapper {
      width: 100%;
      height: 100%;
      overflow: hidden;      /* ← 窓になる */
    }
    #pano {
      height: 100%;
      display: block;
      cursor: grab;          /* 視覚的にも「動かせそう」に */
    }
  </style>
</head>
<body>

<div id="wrapper">
  <img id="pano" src="{{ page.image }}">
</div>

<script>
  const img = document.getElementById('pano');
  const panzoom = Panzoom(img, {
    maxScale: 1,
    minScale: 1,
    contain: 'outside'
  });

  // ホイールで横スクロール
  img.addEventListener('wheel', function(e) {
    e.preventDefault();
    panzoom.pan({
      x: panzoom.getPan().x - e.deltaY,  // ← ホイール上下で横移動
      y: panzoom.getPan().y
    });
  });
</script>

</body>
</html>
