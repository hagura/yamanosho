<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Marzipano Partial Panorama A</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://cdn.jsdelivr.net/npm/marzipano/dist/marzipano.js"></script>

  <style>
    html, body { height: 100%; margin: 0; }
    #pano { width: 100%; height: 100%; }
  </style>
</head>
<body>

<div id="pano"></div>

<script>
  // iPhone パノラマの実サイズ（例）
  const width = 4000;
  const height = 936;

  // Viewer
  const viewer = new Marzipano.Viewer(document.getElementById('pano'));

  // 画像ソース
  const source = Marzipano.ImageUrlSource.fromString(
    '{{ page.image }}'
  );

  // 部分パノラマ用 geometry（幅だけ指定すればOK）
  const geometry = new Marzipano.EquirectGeometry([{ width: width }]);

  // 視野角の制限（自然に見える設定）
  const limiter = Marzipano.RectilinearView.limit.traditional(
    120 * Math.PI/180, // 最大視野角
    50 * Math.PI/180   // 最小視野角
  );

  // 初期ビュー
  const view = new Marzipano.RectilinearView(
    { yaw: 0, pitch: 0, fov: Math.PI/3 },
    limiter
  );

  // シーン作成
  const scene = viewer.createScene({
    source: source,
    geometry: geometry,
    view: view,
    pinFirstLevel: true
  });

  scene.switchTo();
</script>

</body>
</html>
